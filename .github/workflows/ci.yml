name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ---------------------------------------------------------------------------
  # Primary build: Release + clang-tidy + benchmark smoke test
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Lint (ubuntu-22.04, clang-14)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang-14 \
            clang-tidy-14 \
            libbenchmark-dev \
            cmake \
            ninja-build \
            pkg-config

          sudo update-alternatives --install /usr/bin/clang++    clang++    /usr/bin/clang++-14    100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-14 100

      - name: Configure (Release)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DENABLE_XDP=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: clang-tidy
        run: |
          clang-tidy \
            -p build \
            src/itch/parser.cpp \
            src/itch/order_book.cpp \
            src/net/pcap_replay.cpp \
            src/net/xdp_socket.cpp

      - name: Benchmark smoke test
        run: |
          ./build/bm_itch \
            --benchmark_filter="BM_BookUpdate_Add|BM_BookUpdate_Cancel" \
            --benchmark_min_time=0.01 \
            --benchmark_out=bm_results.json \
            --benchmark_out_format=json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bm_results.json

  # ---------------------------------------------------------------------------
  # Debug build: AddressSanitizer + UndefinedBehaviorSanitizer
  # ---------------------------------------------------------------------------
  asan-ubsan:
    name: ASan + UBSan (ubuntu-22.04, clang-14)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang-14 \
            libbenchmark-dev \
            cmake \
            ninja-build

          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-14 100

      - name: Configure (Debug with sanitizers)
        run: |
          cmake -B build-debug -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DENABLE_XDP=OFF

      - name: Build (Debug)
        run: cmake --build build-debug --parallel

      - name: Run benchmark under sanitizers
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          ./build-debug/bm_itch \
            --benchmark_filter="BM_BookUpdate_Add|BM_BookUpdate_Cancel" \
            --benchmark_min_time=0.01

  # ---------------------------------------------------------------------------
  # GCC cross-check
  # ---------------------------------------------------------------------------
  gcc-build:
    name: Build (ubuntu-22.04, GCC-12)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++-12 libbenchmark-dev cmake ninja-build

      - name: Configure
        run: |
          cmake -B build-gcc -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DENABLE_XDP=OFF

      - name: Build
        run: cmake --build build-gcc --parallel
